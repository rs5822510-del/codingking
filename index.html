<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Profile Card -->
    <div class="card">
        <img src="https://via.placeholder.com/150" alt="profile">
        <h2>Rohit Singh</h2>
        <p>Frontend Developer</p>
        <button>Follow</button>
    </div>

    <!-- About Section -->
    <section class="about">
        <h2>About Me</h2>
        <p>I am learning full stack development and improving my DSA skills.</p>
    </section>

    <!-- Skills Section -->
    <section class="skills">
        <h2>My Skills</h2>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ul>
    </section>

    <!-- Projects Section -->
    <section class="projects">
        <h2>Projects</h2>
        <div class="project-card">
            <h3>Portfolio Website</h3>
            <p>A simple personal portfolio using HTML and CSS.</p>
        </div>
        <div class="project-card">
            <h3>Todo App</h3>
            <p>A basic todo list using JavaScript.</p>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Rohit Singh</p>
    </footer>

</body>
</html>
